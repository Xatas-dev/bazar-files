quarkus:
  datasource:
    db-kind: postgresql
    username: ${SYSTEM_DB_USERNAME}
    password: ${SYSTEM_DB_PASSWORD}
    jdbc:
      url: ${SYSTEM_DB_URL}
    devservices:
      enabled: false

  liquibase:
    migrate-at-start: true
    change-log: db/changelog/changelog-master.yaml

  s3:
    endpoint-override: ${SYSTEM_S3_ENDPOINT}
    path-style-access: true
    aws:
      region: ${SYSTEM_S3_REGION}
      credentials:
        type: static
        static-provider:
          access-key-id: ${SYSTEM_S3_ACCESS_KEY}
          secret-access-key: ${SYSTEM_S3_SECRET_KEY}

settings:
  s3:
    bucket:
      files: ${SETTING_S3_BUCKET_FILES}
    upload-url-ttl: ${SETTING_S3_UPLOAD_URL_TTL}
    download-url-ttl: ${SETTING_S3_DOWNLOAD_URL_TTL}
    internal-endpoint: ${SYSTEM_S3_INTERNAL_ENDPOINT}
  scheduler:
    delete-files:
      cron: ${SETTING_SCHEDULER_DELETE_FILES_CRON}
      batch-size: ${SETTING_SCHEDULER_DELETE_FILES_BATCH_SIZE}

kafka:
  bootstrap:
    servers: ${INTEGRATION_KAFKA_BOOTSTRAP_SERVERS}

mp:
  messaging:
    outgoing:
      file.events:
        connector: smallrye-kafka
        topic: file.events
        bootstrap:
          servers: ${INTEGRATION_KAFKA_BOOTSTRAP_SERVERS}
        value:
          serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer